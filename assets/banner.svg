  <text x="84" y="186" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="56" font-weight="800">Narendra Jadaun</text>
  <text x="88" y="235" fill="#BAE6FD" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26">APIs " Dashboards " Automation " Scalable Systems</text>

